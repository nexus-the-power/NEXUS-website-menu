    function t(key, p=null){ let txt=translations[currentLang][key]; if(p && typeof txt==='function') return txt(p); return txt || key; }
    
    let activeCategory="all", searchQuery="";
    function showToast(msg, isError=false){ let d=document.createElement('div'); d.className='toast-msg'; d.innerText=msg; d.style.background=isError?'#6a1e3ccc':'#0f2a3ecc'; document.body.appendChild(d); setTimeout(()=>{ d.style.opacity='0'; setTimeout(()=>d.remove(),400); },2300); }
    function escapeHtml(s){ return s.replace(/[&<>]/g,function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    
    async function renderStore(){
        const container=document.getElementById('storeList'); if(!container) return;
        let filtered=products.filter(p=>p.name[currentLang].toLowerCase().includes(searchQuery) && (activeCategory==='all' || p.category[currentLang]===activeCategory));
        if(filtered.length===0){ container.innerHTML=`<div class="no-results"><i class="fas fa-box-open"></i> ${t('noResults')}</div>`; return; }
        container.innerHTML='';
        for(const prod of filtered){
            const card=document.createElement('div'); card.className='glass-card'; if(prod.locked) card.classList.add('locked-card'); card.setAttribute('data-info',prod.infoText[currentLang]);
            const passHtml=!prod.locked?`<button class="pass-btn" data-pass="${prod.pass}"><i class="fas fa-lock"></i></button>`:`<button class="pass-btn" disabled style="opacity:0.4;"><i class="fas fa-hourglass-half"></i></button>`;
            const downloadBtn=!prod.locked?`<button class="btn-download" data-url="${prod.githubUrl}" data-name="${prod.name[currentLang]}"><i class="fas fa-download"></i> ${t('download')}</button>`:`<button class="btn-download" disabled style="background:#2a2a44;cursor:not-allowed;"><i class="fas fa-lock"></i> ${t('locked')}</button>`;
            const reqBtn=!prod.locked?`<button class="btn-requirements requirements-btn" data-req="${escapeHtml(prod.requirements[currentLang])}"><i class="fas fa-info-circle"></i> ${t('reqBtn')}</button>`:'';
            card.innerHTML=`<div class="category-badge"><i class="fas fa-tag"></i> ${prod.category[currentLang]}</div><div class="card-header"><h2>${escapeHtml(prod.name[currentLang])}</h2></div><div class="product-details"><span class="price-badge"><i class="fas fa-gem"></i> Free</span><span class="file-type"><i class="fas fa-file-code"></i> ${prod.fileType}</span><span class="os-badge"><i class="fab fa-windows"></i> ${prod.os}</span>${passHtml}</div><div class="button-group">${downloadBtn} ${reqBtn}</div><div class="secondary-actions"><button class="icon-btn copy-link-btn" data-url="${prod.githubUrl}" data-name="${prod.name[currentLang]}"><i class="fas fa-copy"></i> <span>${t('copy')}</span></button><button class="icon-btn share-btn" data-url="${prod.githubUrl}" data-name="${prod.name[currentLang]}"><i class="fas fa-share-alt"></i> <span>${t('share')}</span></button><button class="highlight-btn" data-name="${prod.name[currentLang]}"><i class="fas fa-circle-info"></i> ${t('info')}</button></div>`;
            container.appendChild(card);
        }
        attachCardEvents();
    }
    function attachCardEvents(){
        document.querySelectorAll('.btn-download:not([disabled])').forEach(btn=>btn.addEventListener('click',()=>{ const url=btn.dataset.url,name=btn.dataset.name; if(url && url!=='#'){ window.open(url,'_blank'); showToast(name+t('toastDownload')); } else showToast(t('toastLocked'),true); }));
        document.querySelectorAll('.copy-link-btn').forEach(btn=>btn.addEventListener('click',()=>{ const url=btn.dataset.url,name=btn.dataset.name; if(url && url!=='#') copyToClipboard(url,name); else showToast(t('toastNoLink'),true); }));
        document.querySelectorAll('.share-btn').forEach(btn=>btn.addEventListener('click',()=>{ const url=btn.dataset.url,name=btn.dataset.name; if(url && url!=='#') shareLink(url,name); else showToast(t('toastNoLink'),true); }));
        document.querySelectorAll('.pass-btn:not([disabled])').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); alert(t('passwordAlert',btn.dataset.pass)); }));
        document.querySelectorAll('.requirements-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.getElementById('requirementsText').innerHTML=btn.dataset.req; document.getElementById('requirementsModal').style.display='flex'; }));
        document.querySelectorAll('.highlight-btn').forEach(btn=>btn.addEventListener('click',(e)=>{ const card=btn.closest('.glass-card'); if(card.classList.contains('locked-card')){ showToast(t('toastLocked'),true); return; } const info=card.dataset.info; document.getElementById('tooltipText').innerHTML=info; const rect=card.getBoundingClientRect(); let left=rect.right+15,top=rect.top; if(left+280>window.innerWidth) left=rect.left-295; if(top+200>window.innerHeight) top=window.innerHeight-210; const tooltip=document.getElementById('highlightTooltip'); tooltip.style.left=left+'px'; tooltip.style.top=top+'px'; tooltip.style.display='block'; }));
        document.getElementById('closeTooltipBtn').onclick=()=>document.getElementById('highlightTooltip').style.display='none';
    }
    async function copyToClipboard(url,name){ try{ await navigator.clipboard.writeText(url); showToast(name+t('toastCopied')); } catch(e){ showToast(t('toastCopyFail'),true); } }
    async function shareLink(url,name){ if(navigator.share){ try{ await navigator.share({title:`${name} - NEXUS`,text:`Download ${name} for free!`,url}); showToast(t('toastShare')); } catch(e){ if(e.name!=='AbortError') showToast(t('toastShareFail'),true); } } else{ await copyToClipboard(url,name); } }
    function buildCategoryFilters(){ const cats=[...new Set(products.map(p=>p.category[currentLang]))]; let html=`<div class="filter-chip ${activeCategory==='all'?'active':''}" data-category="all">${t('filterAll')}</div>`; cats.forEach(c=>html+=`<div class="filter-chip ${activeCategory===c?'active':''}" data-category="${c}">${c}</div>`); document.getElementById('categoryFilters').innerHTML=html; document.querySelectorAll('.filter-chip').forEach(ch=>ch.addEventListener('click',()=>{ activeCategory=ch.dataset.category; renderStore(); buildCategoryFilters(); })); }

    let adminAuthorized = false;
    let adminEmailMatched = false;
    
    async function checkAdminAccess(user) {
        if (user && user.email) {
            const emailHash = await hashText(user.email);
            if (emailHash === AUTHORIZED_EMAIL_HASH) {
                adminEmailMatched = true;
                const adminTabBtn = document.getElementById('adminTabBtn');
                if (adminTabBtn) adminTabBtn.style.display = 'block';
                return;
            }
        }
        adminEmailMatched = false;
        adminAuthorized = false;
        const adminTabBtn = document.getElementById('adminTabBtn');
        if (adminTabBtn) adminTabBtn.style.display = 'none';
        if (document.getElementById('adminTab').classList.contains('active')) {
            document.querySelector('.tab[data-tab="storeTab"]').click();
        }
    }

    function requestAdminPassword(callback) {
        if (adminAuthorized) {
            if (callback) callback(true);
            return;
        }
        const pwd = prompt("🔐 ADMINISZTRÁTORI HITELESÍTÉS\n\nA folytatáshoz add meg a jelszót:");
        if (pwd) {
            hashText(pwd).then(pwdHash => {
                if (pwdHash === ADMIN_PASSWORD_HASH) {
                    adminAuthorized = true;
                    showToast("Admin hitelesítés sikeres!", false);
                    if (callback) callback(true);
                } else {
                    alert("Hibás jelszó! Nincs hozzáférés.");
                    adminAuthorized = false;
                    if (callback) callback(false);
                }
            });
        } else {
            if (callback) callback(false);
        }
    }
    
    function loadAdminContent() {
        if (!adminEmailMatched) {
            showToast("Nincs jogosultság az admin panelhez!", true);
            return false;
        }
        if (!adminAuthorized) {
            requestAdminPassword((success) => {
                if (success) {
                    renderAdminList();
                    document.getElementById('adminTab').classList.add('active');
                    document.querySelectorAll('#tabsContent > div').forEach(c => c.classList.remove('active'));
                    document.getElementById('adminTab').classList.add('active');
                }
            });
            return false;
        }
        renderAdminList();
        return true;
    }
    
    function renderAdminList() {
        const container = document.getElementById('adminProductList');
        if (!container) return;
        container.innerHTML = products.map((p, idx) => `
            <div class="admin-product-item">
                <div><strong>${escapeHtml(p.name.hu)}</strong> / ${escapeHtml(p.name.en)} <span style="font-size:0.7rem;background:#ffaa3322;padding:2px 8px;border-radius:20px;">${p.locked ? '🔒 Zárolt' : '🔓 Nyitott'}</span></div>
                <div>
                    <button class="admin-btn" onclick="editProduct(${idx})" style="background:#ffaa33; margin-right:8px;"><i class="fas fa-edit"></i> ${currentLang === 'hu' ? 'Szerkeszt' : 'Edit'}</button>
                    <button class="admin-btn" onclick="toggleLock(${idx})" style="background:#8866cc;"><i class="fas fa-lock"></i> ${currentLang === 'hu' ? 'Zárolás/Ki' : 'Lock/Unlock'}</button>
                    <button class="admin-btn" onclick="deleteProduct(${idx})" style="background:#cc3366;"><i class="fas fa-trash"></i> ${currentLang === 'hu' ? 'Törlés' : 'Delete'}</button>
                </div>
            </div>
        `).join('');
    }
    
    window.editProduct = function(idx) {
        if (!adminAuthorized) {
            requestAdminPassword((success) => { if (success) editProduct(idx); });
            return;
        }
        const p = products[idx];
        document.getElementById('prodNameHu').value = p.name.hu;
        document.getElementById('prodNameEn').value = p.name.en;
        document.getElementById('prodCatHu').value = p.category.hu;
        document.getElementById('prodCatEn').value = p.category.en;
        document.getElementById('prodUrl').value = p.githubUrl;
        document.getElementById('prodFileType').value = p.fileType;
        document.getElementById('prodOs').value = p.os;
        document.getElementById('prodPass').value = p.pass;
        document.getElementById('prodReqHu').value = p.requirements.hu;
        document.getElementById('prodReqEn').value = p.requirements.en;
        document.getElementById('prodInfoHu').value = p.infoText.hu;
        document.getElementById('prodInfoEn').value = p.infoText.en;
        document.getElementById('prodLocked').value = p.locked ? "true" : "false";
        const addBtn = document.getElementById('addProductBtn');
        addBtn.innerHTML = `<i class="fas fa-save"></i> ${currentLang === 'hu' ? 'Módosítás mentése' : 'Save changes'}`;
        addBtn.onclick = () => {
            p.name.hu = document.getElementById('prodNameHu').value;
            p.name.en = document.getElementById('prodNameEn').value;
            p.category.hu = document.getElementById('prodCatHu').value;
            p.category.en = document.getElementById('prodCatEn').value;
            p.githubUrl = document.getElementById('prodUrl').value;
            p.fileType = document.getElementById('prodFileType').value;
            p.os = document.getElementById('prodOs').value;
            p.pass = document.getElementById('prodPass').value;
            p.requirements.hu = document.getElementById('prodReqHu').value;
            p.requirements.en = document.getElementById('prodReqEn').value;
            p.infoText.hu = document.getElementById('prodInfoHu').value;
            p.infoText.en = document.getElementById('prodInfoEn').value;
            p.locked = document.getElementById('prodLocked').value === 'true';
            saveProducts();
            renderStore();
            buildCategoryFilters();
            renderAdminList();
            addBtn.innerHTML = `<i class="fas fa-plus"></i> ${currentLang === 'hu' ? 'Új kártya hozzáadása' : 'Add new card'}`;
            addBtn.onclick = addNewProduct;
            document.querySelectorAll('#adminTab input, #adminTab textarea, #adminTab select').forEach(i => i.value = '');
            showToast(currentLang === 'hu' ? 'Termék módosítva!' : 'Product updated!');
        };
    };
    
    window.toggleLock = function(idx) {
        if (!adminAuthorized) {
            requestAdminPassword((success) => { if (success) toggleLock(idx); });
            return;
        }
        products[idx].locked = !products[idx].locked;
        saveProducts();
        renderStore();
        renderAdminList();
        showToast(`${currentLang === 'hu' ? 'Zárolás állapot' : 'Lock status'}: ${products[idx].locked ? (currentLang === 'hu' ? 'ZÁROLT' : 'LOCKED') : (currentLang === 'hu' ? 'NYITOTT' : 'OPEN')}`);
    };
    
    window.deleteProduct = function(idx) {
        if (!adminAuthorized) {
            requestAdminPassword((success) => { if (success) deleteProduct(idx); });
            return;
        }
        if (confirm(currentLang === 'hu' ? 'Biztosan törlöd?' : 'Are you sure?')) {
            products.splice(idx, 1);
            saveProducts();
            renderStore();
            buildCategoryFilters();
            renderAdminList();
            showToast(currentLang === 'hu' ? 'Törölve' : 'Deleted');
        }
    };
    
    function addNewProduct() {
        if (!adminAuthorized) {
            requestAdminPassword((success) => { if (success) addNewProduct(); });
            return;
        }
        const newProd = {
            id: "prod_" + Date.now(),
            githubUrl: document.getElementById('prodUrl').value,
            price: "Free",
            fileType: document.getElementById('prodFileType').value,
            os: document.getElementById('prodOs').value,
            pass: document.getElementById('prodPass').value,
            locked: document.getElementById('prodLocked').value === 'true',
            category: { hu: document.getElementById('prodCatHu').value, en: document.getElementById('prodCatEn').value },
            name: { hu: document.getElementById('prodNameHu').value, en: document.getElementById('prodNameEn').value },
            requirements: { hu: document.getElementById('prodReqHu').value, en: document.getElementById('prodReqEn').value },
            infoText: { hu: document.getElementById('prodInfoHu').value, en: document.getElementById('prodInfoEn').value }
        };
        if (!newProd.name.hu || !newProd.name.en) {
            showToast(currentLang === 'hu' ? 'Név megadása kötelező!' : 'Name is required!', true);
            return;
        }
        products.push(newProd);
        saveProducts();
        renderStore();
        buildCategoryFilters();
        renderAdminList();
        document.querySelectorAll('#adminTab input, #adminTab textarea, #adminTab select').forEach(i => i.value = '');
        showToast(currentLang === 'hu' ? 'Új kártya hozzáadva!' : 'New card added!');
    }
    
    document.getElementById('addProductBtn').onclick = addNewProduct;

    renderStore();
    buildFilters();
</script>
