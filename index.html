    hu: { login:"Belépés", logout:"Kilépés", loginGoogle:"Belépés Google-lel", filterAll:"Összes", download:"LETÖLTÉS", locked:"ZÁROLT", reqBtn:"Köv.", copy:"Másol", share:"Megoszt", info:"Info", noResults:"Nincs találat. Próbálj másik kifejezést.", passwordAlert:(p)=>`Jelszó: ${p}\nHa a Windows blokkolja, tiltsd le az Smart App Control-t.`, toastCopied:" link másolva", toastDownload:" letöltés indítása", toastLocked:"🔒 Zárt tartalom", toastNoLink:"🔒 Nincs elérhető link", toastShare:"✨ Megosztva", toastShareFail:"⚠️ Megosztás sikertelen", toastCopyFail:"❌ Másolás sikertelen", close:"Bezárás", reqTitle:"Rendszerkövetelmény", tooltipTitle:"Termék infó", gotIt:"Rendben", licenseTitle:"Szoftverlicenc és Jogi nyilatkozat", licenseBtn:"⚖️ LICENC & JOGI NYILATKOZAT", subText:"premium .exe releases • direct GitHub", searchPlaceholder:"Keresés név szerint...", tabStore:"⟡ TERMÉKEK", tabCommunity:"⟡ KÖZÖSSÉG", loading:"Betöltés...", realtimeActive:"Valós idejű frissítés aktív", warningBtn:"⚠️ Figyelmeztetés", warningTitle:"⚠️ Figyelmeztetés", warningClose:"Bezárás", downloadConfirm:"Letöltés megerősítése", downloadConfirmText:(name)=>`Valóban le szeretnéd tölteni a(z) "${name}" programot?`, confirmRisk:"Elfogadom a kockázatot és megerősítem a letöltést", cancel:"Mégse" },
    en: { login:"Login", logout:"Logout", loginGoogle:"Login with Google", filterAll:"All", download:"DOWNLOAD", locked:"LOCKED", reqBtn:"Req.", copy:"Copy", share:"Share", info:"Info", noResults:"No results. Try another keyword.", passwordAlert:(p)=>`Password: ${p}\nIf Windows blocks the app, disable Smart App Control.`, toastCopied:" link copied", toastDownload:" download started", toastLocked:"🔒 Locked content", toastNoLink:"🔒 No link available", toastShare:"✨ Shared", toastShareFail:"⚠️ Sharing failed", toastCopyFail:"❌ Copy failed", close:"Close", reqTitle:"System Requirements", tooltipTitle:"Product Info", gotIt:"Got it", licenseTitle:"Software License & Disclaimer", licenseBtn:"⚖️ LICENSE & DISCLAIMER", subText:"premium .exe releases • direct GitHub", searchPlaceholder:"Search by name...", tabStore:"⟡ PRODUCTS", tabCommunity:"⟡ COMMUNITY", loading:"Loading...", realtimeActive:"Real-time updates active", warningBtn:"⚠️ Warning", warningTitle:"⚠️ Warning", warningClose:"Close", downloadConfirm:"Confirm Download", downloadConfirmText:(name)=>`Do you really want to download "${name}"?`, confirmRisk:"I accept the risk and confirm the download", cancel:"Cancel" }
};

function t(key, p=null){ 
    let txt = translations[currentLang][key]; 
    if(p && typeof txt === 'function') return txt(p); 
    return txt || key; 
}

function showToast(msg, isError=false){
    let d = document.createElement('div');
    d.className = 'toast-msg';
    d.innerText = msg;
    d.style.background = isError ? '#6a1e3ccc' : '#0f2a3ecc';
    document.body.appendChild(d);
    setTimeout(() => { d.style.opacity = '0'; setTimeout(() => d.remove(), 400); }, 2300);
}

function escapeHtml(s){ 
    if(!s) return ''; 
    return s.replace(/[&<>]/g, function(m){ 
        if(m === '&') return '&amp;'; 
        if(m === '<') return '&lt;'; 
        if(m === '>') return '&gt;'; 
        return m;
    }); 
}

async function copyToClipboard(url, name){
    try { 
        await navigator.clipboard.writeText(url); 
        showToast(name + t('toastCopied')); 
    } catch(e){ 
        showToast(t('toastCopyFail'), true); 
    }
}

async function shareLink(url, name){
    if(navigator.share){
        try { 
            await navigator.share({
                title: `${name} - NYXION`,
                text: `Download ${name} for free!`,
                url: url
            }); 
            showToast(t('toastShare')); 
        } catch(e){ 
            if(e.name !== 'AbortError') {
                showToast(t('toastShareFail'), true);
            }
        } 
    } else {
        await copyToClipboard(url, name);
    }
}

function showPasswordDialog(password) {
    const modal = document.createElement('div');
    modal.className = 'overlay';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-card">
            <h4><i class="fas fa-lock"></i> Jelszó</h4>
            <p style="margin: 1rem 0;"><strong>Termék jelszava:</strong></p>
            <code style="display: block; background: #00000055; padding: 0.8rem; border-radius: 12px; text-align: center; font-size: 1.2rem;">${escapeHtml(password)}</code>
            <p style="margin-top: 1rem; font-size: 0.8rem; color: #ffaa88;">ℹ️ Ha a Windows blokkolja, tiltsd le az Smart App Control-t.</p>
            <button class="close-modal" style="margin-top: 1.5rem;">${t('close')}</button>
        </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
}

function showDownloadConfirm(name, url) {
    pendingDownload = { name, url };
    const modal = document.getElementById('downloadConfirmModal');
    document.getElementById('downloadConfirmText').innerHTML = t('downloadConfirmText', name);
    document.getElementById('confirmDownloadLabel').innerText = t('confirmRisk');
    document.getElementById('downloadConfirmTitle').innerText = t('downloadConfirm');
    const checkbox = document.getElementById('confirmDownloadRisk');
    const confirmBtn = document.getElementById('confirmDownloadBtn');
    checkbox.checked = false;
    confirmBtn.disabled = true;
    checkbox.onchange = () => { confirmBtn.disabled = !checkbox.checked; };
    confirmBtn.onclick = () => {
        if(checkbox.checked && pendingDownload) {
            window.open(pendingDownload.url, '_blank');
            showToast(pendingDownload.name + t('toastDownload'));
            modal.style.display = 'none';
            pendingDownload = null;
        }
    };
    document.getElementById('cancelDownloadBtn').onclick = () => {
        modal.style.display = 'none';
        pendingDownload = null;
    };
    modal.style.display = 'flex';
}

function attachCardEvents(){
    document.querySelectorAll('.btn-download:not([disabled])').forEach(btn => {
        btn.removeEventListener('click', btn._listener);
        const handler = () => {
            const url = btn.dataset.url;
            const name = btn.dataset.name;
            if(url && url !== '#'){ 
                showDownloadConfirm(name, url);
            } else { 
                showToast(t('toastLocked'), true); 
            }
        };
        btn.addEventListener('click', handler);
        btn._listener = handler;
    });
    
    document.querySelectorAll('.copy-link-btn:not(.disabled)').forEach(btn => {
        btn.removeEventListener('click', btn._copyListener);
        const handler = () => {
            const url = btn.dataset.url;
            const name = btn.dataset.name;
            if(url && url !== '#'){ 
                copyToClipboard(url, name); 
            } else { 
                showToast(t('toastNoLink'), true); 
            }
        };
        btn.addEventListener('click', handler);
        btn._copyListener = handler;
    });
    
    document.querySelectorAll('.share-btn:not(.disabled)').forEach(btn => {
        btn.removeEventListener('click', btn._shareListener);
        const handler = () => {
            const url = btn.dataset.url;
            const name = btn.dataset.name;
            if(url && url !== '#'){ 
                shareLink(url, name); 
            } else { 
                showToast(t('toastNoLink'), true); 
            }
        };
        btn.addEventListener('click', handler);
        btn._shareListener = handler;
    });
    
    document.querySelectorAll('.pass-btn:not([disabled])').forEach(btn => {
        btn.removeEventListener('click', btn._passListener);
        const handler = () => { 
            showPasswordDialog(btn.dataset.pass);
        };
        btn.addEventListener('click', handler);
        btn._passListener = handler;
    });
    
    document.querySelectorAll('.requirements-btn').forEach(btn => {
        btn.removeEventListener('click', btn._reqListener);
        const handler = () => {
            document.getElementById('requirementsText').innerHTML = btn.dataset.req;
            document.getElementById('requirementsModal').style.display = 'flex';
        };
        btn.addEventListener('click', handler);
        btn._reqListener = handler;
    });
    
    document.querySelectorAll('.highlight-btn').forEach(btn => {
        btn.removeEventListener('click', btn._infoListener);
        const handler = (e) => {
            const card = btn.closest('.glass-card');
            if(card.classList.contains('locked-card')){ 
                showToast(t('toastLocked'), true); 
                return; 
            }
            const info = card.dataset.info;
            showToast(info, false);
        };
        btn.addEventListener('click', handler);
        btn._infoListener = handler;
    });
}

function renderStore(){
    const container = document.getElementById('storeList');
    if(!container) return;
    
    let filtered = products.filter(p => 
        !p.deleted && 
        (p.name?.[currentLang] || '').toLowerCase().includes(searchQuery) && 
        (activeCategory === 'all' || (p.category?.[currentLang] || '') === activeCategory)
    );
    
    if(filtered.length === 0){ 
        container.innerHTML = `<div class="no-results"><i class="fas fa-box-open"></i> ${t('noResults')}</div>`; 
        return; 
    }
    
    container.innerHTML = '';
    for(const prod of filtered){
        const card = document.createElement('div');
        card.className = 'glass-card';
        if(prod.locked) card.classList.add('locked-card');
        card.setAttribute('data-info', escapeHtml(prod.infoText?.[currentLang] || ''));
        
        const passHtml = !prod.locked ? 
            `<button class="pass-btn" data-pass="${escapeHtml(prod.pass || 'nyxion')}"><i class="fas fa-lock"></i></button>` : 
            `<button class="pass-btn" disabled style="opacity:0.4;"><i class="fas fa-hourglass-half"></i></button>`;
        
        const downloadBtn = !prod.locked ? 
            `<button class="btn-download" data-url="${escapeHtml(prod.githubUrl)}" data-name="${escapeHtml(prod.name[currentLang])}"><i class="fas fa-download"></i> ${t('download')}</button>` : 
            `<button class="btn-download" disabled style="background:#2a2a44;cursor:not-allowed;"><i class="fas fa-lock"></i> ${t('locked')}</button>`;
        
        const reqBtn = !prod.locked ? 
            `<button class="btn-requirements requirements-btn" data-req="${escapeHtml(prod.requirements?.[currentLang] || '')}"><i class="fas fa-info-circle"></i> ${t('reqBtn')}</button>` : '';
        
        const copyShareClass = prod.locked ? 'disabled' : '';
        
        card.innerHTML = `
            <div class="category-badge"><i class="fas fa-tag"></i> ${escapeHtml(prod.category?.[currentLang] || 'Egyéb')}</div>
            <div class="card-header"><h2>${escapeHtml(prod.name[currentLang])}</h2></div>
            <div class="product-details">
                <span class="price-badge"><i class="fas fa-gem"></i> Free</span>
                <span class="file-type"><i class="fas fa-file-code"></i> ${escapeHtml(prod.fileType || '.exe')}</span>
                <span class="os-badge"><i class="fab fa-windows"></i> ${escapeHtml(prod.os || 'Win10/11')}</span>
                ${passHtml}
            </div>
            <div class="button-group">
                ${downloadBtn} 
                ${reqBtn}
            </div>
            <div class="secondary-actions">
                <button class="icon-btn copy-link-btn ${copyShareClass}" data-url="${escapeHtml(prod.githubUrl)}" data-name="${escapeHtml(prod.name[currentLang])}" ${prod.locked ? 'disabled' : ''}><i class="fas fa-copy"></i> <span>${t('copy')}</span></button>
                <button class="icon-btn share-btn ${copyShareClass}" data-url="${escapeHtml(prod.githubUrl)}" data-name="${escapeHtml(prod.name[currentLang])}" ${prod.locked ? 'disabled' : ''}><i class="fas fa-share-alt"></i> <span>${t('share')}</span></button>
                <button class="highlight-btn"><i class="fas fa-circle-info"></i> ${t('info')}</button>
            </div>
        `;
        container.appendChild(card);
    }
    attachCardEvents();
}

function buildCategoryFilters(){
    const cats = [...new Set(products.filter(p => !p.deleted).map(p => p.category?.[currentLang] || 'Egyéb'))];
    let html = `<div class="filter-chip ${activeCategory === 'all' ? 'active' : ''}" data-category="all">${t('filterAll')}</div>`;
    cats.forEach(c => html += `<div class="filter-chip ${activeCategory === c ? 'active' : ''}" data-category="${c}">${escapeHtml(c)}</div>`);
    document.getElementById('categoryFilters').innerHTML = html;
    document.querySelectorAll('.filter-chip').forEach(ch => {
        ch.addEventListener('click', () => {
            activeCategory = ch.dataset.category;
            renderStore();
            buildCategoryFilters();
        });
    });
}

function setupRealtimeListener() {
    db.collection('products').onSnapshot((snapshot) => {
        products = [];
        snapshot.forEach(doc => { 
            const data = doc.data();
            data.id = doc.id;
            if(!data.deleted) products.push(data); 
        });
        renderStore();
        buildCategoryFilters();
        document.getElementById('realtimeStatus').innerHTML = `<i class="fas fa-check-circle"></i> ${t('realtimeActive')}`;
    }, (error) => { 
        console.error("Listener error:", error);
        showToast("Adatbázis hiba! Ellenőrizd a Firebase beállításokat.", true);
    });
}

function updateAuthUI(user){
    if(user){ 
        const authBtn = document.getElementById('authActionBtn');
        authBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i> ${t('logout')}`;
        authBtn.onclick = () => auth.signOut(); 
        document.getElementById('userInfoArea').style.display = 'flex'; 
        document.getElementById('userAvatarSmall').src = user.photoURL || 'https://placehold.co/40x40/0a1220/cyan?text=U'; 
        document.getElementById('userNameSmall').innerText = user.displayName || user.email?.split('@')[0] || (currentLang === 'hu' ? 'Felhasználó' : 'User'); 
    } else { 
        const authBtn = document.getElementById('authActionBtn');
        authBtn.innerHTML = `<i class="fab fa-google"></i> ${t('loginGoogle')}`;
        authBtn.onclick = () => auth.signInWithPopup(provider).catch(err => showToast(`Login error: ${err.message}`, true)); 
        document.getElementById('userInfoArea').style.display = 'none'; 
    }
}

function applyLanguage(){
    document.getElementById('tabStore').innerText = t('tabStore');
    document.getElementById('tabCommunity').innerText = t('tabCommunity');
    document.getElementById('subText').innerText = t('subText');
    document.getElementById('searchInput').placeholder = t('searchPlaceholder');
    document.getElementById('licenseBtnText').innerText = t('licenseBtn');
    document.getElementById('licenseTitle').innerText = t('licenseTitle');
    document.getElementById('closeBtnText').innerText = t('close');
    document.getElementById('reqTitle').innerText = t('reqTitle');
    document.getElementById('closeReqBtnText').innerText = t('close');
    document.getElementById('licenseContent').innerHTML = licenseTexts[currentLang];
    document.getElementById('realtimeStatus').innerHTML = `<i class="fas fa-check-circle"></i> ${t('realtimeActive')}`;
    document.getElementById('warningBtnText').innerText = t('warningBtn');
    document.getElementById('warningTitle').innerText = t('warningTitle');
    document.getElementById('warningCloseBtn').innerText = t('warningClose');
    document.getElementById('warningContent').innerHTML = warningTexts[currentLang];
    
    const loginSpan = document.getElementById('loginText');
    if(loginSpan) loginSpan.innerText = auth.currentUser ? t('logout') : t('login');
    const authBtnElem = document.getElementById('authActionBtn');
    if(authBtnElem){
        if(auth.currentUser) authBtnElem.innerHTML = `<i class="fas fa-sign-out-alt"></i> ${t('logout')}`;
        else authBtnElem.innerHTML = `<i class="fab fa-google"></i> ${t('loginGoogle')}`;
    }
    
    activeCategory = "all";
    buildCategoryFilters(); 
    renderStore();
}

function setLanguage(lang){ 
    currentLang = lang; 
    localStorage.setItem('nyxionLang', lang); 
    document.querySelectorAll('.lang-btn').forEach(btn => { 
        if(btn.dataset.lang === lang) btn.classList.add('active'); 
        else btn.classList.remove('active'); 
    }); 
    activeCategory = "all";
    applyLanguage(); 
}

document.getElementById('searchInput').addEventListener('input', e => { 
    searchQuery = e.target.value.toLowerCase(); 
    renderStore(); 
});

document.getElementById('warningBtn').addEventListener('click', () => {
    document.getElementById('warningContent').innerHTML = warningTexts[currentLang];
    document.getElementById('warningModal').style.display = 'flex';
});

document.getElementById('licenseBtn').addEventListener('click', () => {
    document.getElementById('licenseModal').style.display = 'flex';
});

document.getElementById('closeLicenseModalBtn').addEventListener('click', () => document.getElementById('licenseModal').style.display = 'none');
document.getElementById('closeWarningModalBtn').addEventListener('click', () => document.getElementById('warningModal').style.display = 'none');
document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('requirementsModal').style.display = 'none');

document.getElementById('licenseModal').addEventListener('click', (e) => {
    if(e.target === document.getElementById('licenseModal')) document.getElementById('licenseModal').style.display = 'none';
});
document.getElementById('warningModal').addEventListener('click', (e) => {
    if(e.target === document.getElementById('warningModal')) document.getElementById('warningModal').style.display = 'none';
});
document.getElementById('requirementsModal').addEventListener('click', (e) => {
    if(e.target === document.getElementById('requirementsModal')) document.getElementById('requirementsModal').style.display = 'none';
});

document.getElementById('downloadConfirmModal').addEventListener('click', (e) => {
    if(e.target === document.getElementById('downloadConfirmModal')) {
        document.getElementById('downloadConfirmModal').style.display = 'none';
        pendingDownload = null;
    }
});

document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        const tabId = tab.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('#tabsContent>div').forEach(c => c.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    });
});

document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
});

auth.onAuthStateChanged(updateAuthUI);

setLanguage(currentLang);
setupRealtimeListener();
</script>
